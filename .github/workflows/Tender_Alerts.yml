name: Vehicle Tender Alerts

on:
  schedule:
    - cron: '0 8 * * 1'
    - cron: '0 8 * * 4'

  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: |
          pip install requests pandas openpyxl beautifulsoup4 lxml

      - name: Run Tender Script
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python tender_script.py

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: vehicle-tender-reports
          path: |
            *.xlsx
            *.csv

      - name: Commit updated history
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add *.xlsx || true
          git commit -m "Update tender history" || echo "No changes"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
